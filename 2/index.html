<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML in Canvas — 3D Foil Card Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Klee+One&display=swap');

@font-face {
	font-family: 'SourceIcons';
	src: url('../1/source-icons.woff2') format('woff2');
}

body {
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	gap: 20px;
	box-sizing: border-box;
	min-height: 100vh;
	margin: 0;
	padding: 24px;
	background: #0d0d14;
}

.page-note {
	margin: 0;
	font-family: monospace;
	font-size: 12px;
	letter-spacing: 0.06em;
	color: #999;
}

.canvas {
	display: block;
}

.card {
	position: relative;
	width: 480px;
	height: 670px;
	border-radius: 16px;
	overflow: hidden;
	background: linear-gradient(165deg, #7a8492 0%, #4e5462 48%, #252830 100%);
}

.card::after {
	content: '';
	position: absolute;
	inset: 0;
	z-index: 1;
	border-radius: 16px;
	background: url('../1/bg.png') center / cover no-repeat;
	mix-blend-mode: multiply;
	pointer-events: none;
}

.card-inner {
	position: relative;
	z-index: 2;
	display: flex;
	flex-direction: column;
	box-sizing: border-box;
	gap: 7px;
	height: 100%;
	padding: 12px;
}

.card-header {
	display: flex;
	flex-shrink: 0;
	align-items: center;
	gap: 8px;
	box-sizing: border-box;
	height: 36px;
	padding: 0 10px;
	border: 1px solid rgba(180, 185, 200, 0.8);
	border-radius: 6px;
	background: linear-gradient(90deg,
		rgba(80, 88, 104, 0.95) 0%,
		rgba(50, 55, 68, 0.95) 100%
	);
}

.card-name {
	flex: 1;
	min-width: 0;
	padding: 0;
	border: none;
	font-family: 'Klee One', serif;
	font-size: 17px;
	color: #e8e8f0;
	background: transparent;
}

.card-cost {
	flex-shrink: 0;
	width: 58px;
	padding: 0;
	border: none;
	font-family: 'SourceIcons', serif;
	font-size: 22px;
	letter-spacing: 4px;
	text-align: right;
	color: #ffffff;
	background: transparent;
}

.card-art-frame {
	flex-shrink: 0;
	box-sizing: border-box;
	height: 268px;
	border: 2px solid rgba(180, 185, 200, 0.8);
	border-radius: 3px;
	overflow: hidden;
}

.card-art-frame img {
	display: block;
	width: 100%;
	height: 100%;
	object-fit: cover;
}

.card-type-bar {
	display: flex;
	flex-shrink: 0;
	align-items: center;
	box-sizing: border-box;
	height: 28px;
	padding: 0 10px;
	border: 1px solid rgba(180, 185, 200, 0.8);
	border-radius: 6px;
	background: linear-gradient(90deg,
		rgba(80, 88, 104, 0.95) 0%,
		rgba(50, 55, 68, 0.95) 100%
	);
}

.card-type {
	width: 100%;
	padding: 0;
	border: none;
	font-family: 'Klee One', serif;
	font-size: 16px;
	color: #d0d0e0;
	background: transparent;
}

.card-text-box {
	flex: 1;
	min-height: 0;
	padding: 10px;
	border: 1px solid rgba(130, 138, 158, 0.5);
	border-radius: 4px;
	background: rgba(18, 20, 28, 0.78);
}

.card-text {
	position: relative;
	width: 100%;
	height: 100%;
	margin: 0;
	padding: 0;
	border: none;
	font-family: 'SourceIcons', 'Klee One', serif;
	font-size: 16px;
	line-height: 1.5;
	color: #d8d8e0;
	background: transparent;
	resize: none;
}

.card-bottom {
	display: flex;
	flex-shrink: 0;
	align-items: center;
	justify-content: space-between;
	height: 16px;
}

.card-bottom span {
	font-family: 'Klee One', serif;
	font-size: 9px;
	letter-spacing: 0.04em;
	color: #7a8898;
}
</style>
</head>
<body>

<p class="page-note">HTML in Canvas が有効なブラウザで表示してください</p>

<canvas class="canvas" layoutsubtree>
	<div class="card">
		<div class="card-inner">

			<div class="card-header">
				<input class="card-name" type="text" value="運命の分岐器">
				<input class="card-cost" type="text" value="④">
			</div>

			<div class="card-art-frame">
				<img src="../1/illus.webp" alt="">
			</div>

			<div class="card-type-bar">
				<input class="card-type" type="text" value="伝説のアーティファクト">
			</div>

			<div class="card-text-box">
				<textarea class="card-text">&#xE005;, &#xE000;：あなたは3点のライフを得る。または、いずれかの対象が受ける次のダメージを3点軽減する。
&#xE002;, &#xE000;：カードを3枚引く。
&#xE006;, &#xE000;：あなたのエネルギープールに&#xE006;&#xE006;&#xE006;を加える。
&#xE001;, &#xE000;：任意の対象1つに3点のダメージを与える。
&#xE003;, &#xE000;：対象1体はターン終了時まで+3/+3を得る。

“未来は無数に枝分かれする。だが、そのすべてを見通す者はほとんどいない。”</textarea>
			</div>

			<div class="card-bottom">
				<span>★ Rare</span>
				<span>Illus. Chat GPT</span>
			</div>

		</div>
	</div>
</canvas>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js';

if ( ! ( 'requestPaint' in HTMLCanvasElement.prototype ) ) alert( 'HTML in Canvas が有効なブラウザで表示してください' );

const card = document.querySelector( '.card' );

const elWidth = card.offsetWidth;
const elHeight = card.offsetHeight;
const artFrame = card.querySelector( '.card-art-frame' );
const canvas = document.querySelector( '.canvas' );

const renderer = new THREE.WebGLRenderer( { canvas, antialias: true } );
renderer.setPixelRatio( window.devicePixelRatio );
renderer.setSize( elWidth, elHeight );
renderer.outputColorSpace = THREE.SRGBColorSpace;

// texElementImage2D の API シグネチャは Chrome 150 で変更された:
//   Chrome 138 - 149: ( target, level, internalformat, srcformat, srctype, element )  ← 旧 (texImage2D 互換)
//   Chrome 150+:      ( target, internalformat, element )                              ← 新 (WICG 仕様)
// three.js r184 は旧シグネチャでしか呼ばないため Chrome 150+ でエラーになる。
// PR #33788 (2026-06-12 マージ) で両対応済み。r185 以降では不要。
// https://github.com/mrdoob/three.js/pull/33788
const gl = renderer.getContext();
if ( 'texElementImage2D' in gl ) {

	const _orig = gl.texElementImage2D.bind( gl );
	gl.texElementImage2D = function () {

		const args = Array.from( arguments );
		if ( args.length >= 6 && args[ 5 ] instanceof Element ) {
			_orig( args[ 0 ], gl.RGBA8, args[ 5 ] );
		} else {
			_orig.apply( gl, args );
		}

	};

}

const scene = new THREE.Scene();
scene.background = new THREE.Color( 0x0d0d14 );

const camera = new THREE.PerspectiveCamera( 50, elWidth / elHeight, 0.1, 100 );
camera.position.z = 2.6;

// ---- foil シェーダー ----
// https://www.4rknova.com/blog/2025/08/30/foil-sticker を参考にした、
// 角度依存の薄膜干渉（iridescence）+ 手続き的なフレーク（sparkle）の合成。
//
//   1. ビュー方向と法線の cosθ から、sin 波 3 本（RGB 位相 120° ずつ）で
//      虹色を生成（thin-film 近似）
//   2. hash() で生成した手続きノイズで小さな金属フレークを散らし、
//      法線を微小に揺らして反射ベクトルを撹乱 → ギラッとした粒状光沢に
//   3. Fresnel-Schlick で視野角端ほど反射を強める
//   4. envMap の代わりに簡易な手続き sky を反射ベクトルから生成

const vertexShader = /* glsl */`
varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vTangent;
varying vec3 vBitangent;
varying vec3 vWorldPos;

void main() {

	vUv = uv;
	mat3 M = mat3( modelMatrix );
	vNormal    = normalize( M * normal );
	vTangent   = normalize( M * vec3( 1.0, 0.0, 0.0 ) );
	vBitangent = normalize( M * vec3( 0.0, 1.0, 0.0 ) );
	vec4 worldPos = modelMatrix * vec4( position, 1.0 );
	vWorldPos = worldPos.xyz;
	gl_Position = projectionMatrix * viewMatrix * worldPos;

}
`;

const fragmentShader = /* glsl */`
#define PI 3.14159265

uniform sampler2D uCardTex;
uniform sampler2D uVoronoi;
uniform float     uTime;
uniform vec3      uCameraPos;

uniform float uIridescence;
uniform float uIriMin;
uniform float uIriRange;
uniform float uIriCellPhase;

uniform float uVoronoiTiling;
uniform float uCellNormal;

uniform float uMetalSheen;
uniform float uArtFoilReduction;

uniform float uFlakesEnabled;
uniform float uFlakeSize;
uniform float uFlakeReduction;
uniform float uFlakeThreshold;
uniform float uFlakeBrightness;

uniform float uMetalness;
uniform float uRoughness;
uniform float uEnvIntensity;
uniform float uFoilStrength;

uniform vec2 uArtMin;
uniform vec2 uArtMax;

varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vTangent;
varying vec3 vBitangent;
varying vec3 vWorldPos;

float hash( vec2 p ) {

	return fract( sin( dot( p, vec2( 127.1, 311.7 ) ) ) * 43758.5453123 );

}

float foilLuminance( vec3 c ) {

	return dot( c, vec3( 0.2126, 0.7152, 0.0722 ) );

}

// 薄膜干渉の色。cosθ を主軸に、Voronoi 由来の小さな位相揺らぎを加えて
// ROYGBIV の色順は連続させつつセルごとに僅かにずらす。
vec3 iridescenceColor( float cosTheta, float phaseJitter ) {

	float thickness = uIriMin + uIriRange * ( 1.0 - cosTheta );
	float phase     = 6.28318 * thickness * 0.01 + phaseJitter + uTime * 0.35;
	vec3 rainbow    = 0.5 + 0.5 * vec3( sin( phase ), sin( phase + 2.094 ), sin( phase + 4.188 ) );
	return mix( vec3( 1.0 ), rainbow, uIridescence );

}

// envMap の代わりに、明るめのヘミスフィア sky + 鋭い帯 lobe を合成する。
// 暗い base に foil が埋もれないよう、off-band でも一定以上の env を確保する。
vec3 sampleEnv( vec3 R, float roughness ) {

	// ヘミスフィア sky: 全方向で底値が高いので「反射ゼロ」にならない
	float hemi = R.y * 0.5 + 0.5;
	vec3 sky = mix(
		vec3( 0.60, 0.60, 0.70 ),  // 下向き反射でも foil が乗る最低レベル
		vec3( 1.20, 1.22, 1.35 ),  // 上向き反射のピーク
		hemi
	);

	// 主役: 縦寄りの斜め線光源
	vec3 lineAxis = normalize( vec3( 0.3, 1.0, 0.0 ) );
	float lineAlign = abs( dot( R, lineAxis ) );
	float e = mix( 25.0, 4.0, roughness );
	float bandLobe = pow( max( 1.0 - lineAlign, 0.0 ), e );

	return sky + vec3( 3.5 ) * bandLobe;

}

void main() {

	vec4 base = texture2D( uCardTex, vUv );

	vec3 V = normalize( uCameraPos - vWorldPos );

	// ---- Voronoi 鱗 (タンジェント空間 normal map) ----
	// 反射ベクトルにだけ Voronoi の摂動を効かせ、虹色の cosθ には原法線を使う。
	// → 帯の内側で ROYGBIV の色順が連続しつつ、ハイライト強度はセルごとに変動する。
	vec3 nm = texture2D( uVoronoi, vUv * uVoronoiTiling ).xyz * 2.0 - 1.0;
	nm.xy *= uCellNormal;
	vec3 N0 = normalize( vNormal );
	vec3 N  = normalize( nm.x * vTangent + nm.y * vBitangent + nm.z * vNormal );
	vec3 R  = reflect( -V, N );

	float cosTheta0  = clamp( dot( N0, V ), 0.0, 1.0 );
	float cosTheta   = clamp( dot( N,  V ), 0.0, 1.0 );
	float brightness = foilLuminance( base.rgb );

	// セル由来の小さな位相ジッタ (帯内の色順を保ちつつ、隣接セルで微かにずれる)
	float phaseJitter = ( nm.x + nm.y ) * uIriCellPhase;

	// ---- フレーク ----
	float flakeIntensity = 0.0;
	vec3  flakeEnv       = vec3( 0.0 );

	if ( uFlakesEnabled > 0.5 ) {

		float flake     = hash( floor( vUv * uFlakeSize ) );
		float flakeMask = smoothstep( uFlakeReduction, 1.0, flake );

		float flakeBoost = smoothstep( uFlakeThreshold, 1.0, brightness );

		// 法線を粒ごとに揺らして反射方向を撹乱
		float angleOffset    = ( hash( vec2( flake, flake + 3.0 ) ) - 0.5 ) * 0.4;
		float angleOffset2   = ( hash( vec2( flake + 7.0, flake ) ) - 0.5 ) * 0.4;
		vec3  perturbedN     = normalize( N + vec3( angleOffset, angleOffset2, 0.0 ) );
		vec3  PR             = reflect( -V, perturbedN );

		// 時間で位相を変えて、キラッとした明滅
		float flakePhase = hash( floor( vUv * uFlakeSize ) + floor( PR.xy * 18.0 ) + floor( uTime * 6.0 ) );
		float phaseMod   = mix( 1.0, 1.8, flakePhase );

		float flakeSpec = pow( clamp( dot( perturbedN, V ) * 0.5 + 0.5, 0.0, 1.0 ), 8.0 );
		flakeSpec = max( flakeSpec, 0.15 );

		float flakeRough = clamp( uRoughness * 0.4, 0.0, 1.0 );
		flakeEnv = sampleEnv( PR, flakeRough ) * mix( 0.9, 1.2, brightness );
		flakeEnv = max( flakeEnv, vec3( uFlakeBrightness ) );

		vec3 flakeIri = iridescenceColor( dot( perturbedN, V ), phaseJitter );
		flakeEnv *= mix( vec3( 1.0 ), flakeIri, 0.9 );

		flakeIntensity = flakeMask * flakeBoost * flakeSpec * phaseMod * 18.0;
		flakeIntensity = clamp( flakeIntensity, 0.0, 1.0 );

	}

	// ---- 反射 + Fresnel ----
	float finalRough = clamp( mix( uRoughness, 1.0, flakeIntensity ), 0.0, 1.0 );

	vec3 env = sampleEnv( R, finalRough ) * uEnvIntensity;
	env = mix( env, flakeEnv, flakeIntensity );

	float F0   = mix( 0.04, 1.0, uMetalness );
	float fres = F0 + ( 1.0 - F0 ) * pow( 1.0 - cosTheta, 5.0 );

	// 虹色 (原法線ベースで連続、Voronoi は位相を微かに揺らすだけ)
	float metalicMask = mix( 0.55, 1.0, brightness );
	vec3  iriCol      = iridescenceColor( cosTheta0, phaseJitter ) * metalicMask;
	vec3  iriSpec     = env * fres * iriCol * ( 1.0 - finalRough * 0.85 );

	// 金属シーン (虹色を載せない、ベース反射)。帯の外側でも金属箔らしい反射を出す。
	vec3 metalSpec = env * fres * ( 1.0 - finalRough * 0.85 ) * uMetalSheen;

	vec3 spec = iriSpec + metalSpec;

	// ---- イラスト枠は強度を減衰させる (完全マスクではなく弱める) ----
	float inArt   = step( uArtMin.x, vUv.x ) * step( vUv.x, uArtMax.x ) * step( uArtMin.y, vUv.y ) * step( vUv.y, uArtMax.y );
	float artMask = mix( 1.0, uArtFoilReduction, inArt );

	vec3 color = base.rgb + spec * uFoilStrength * artMask;

	gl_FragColor = vec4( color, base.a );

}
`;

// Voronoi テクスチャ。R/G = セル固有方向, B = セル境界距離 (rawデータ扱い)
const voronoiTex = new THREE.TextureLoader().load( 'voronoi.png' );
voronoiTex.wrapS = voronoiTex.wrapT = THREE.RepeatWrapping;
voronoiTex.colorSpace = THREE.NoColorSpace;
voronoiTex.minFilter = THREE.LinearFilter;
voronoiTex.magFilter = THREE.LinearFilter;
voronoiTex.generateMipmaps = false;

const material = new THREE.ShaderMaterial( {
	uniforms: {
		uCardTex:         { value: null },
		uVoronoi:         { value: voronoiTex },
		uTime:            { value: 0.0 },
		uCameraPos:       { value: new THREE.Vector3() },

		uIridescence:     { value: 1.0 },
		uIriMin:          { value: 0.0 },
		uIriRange:        { value: 300.0 },
		uIriCellPhase:    { value: 1.5 },

		uVoronoiTiling:   { value: 2.0 },
		uCellNormal:      { value: 0.1 },

		uMetalSheen:      { value: 0.05 },
		uArtFoilReduction:{ value: 0.5 },

		uFlakesEnabled:   { value: 1.0 },
		uFlakeSize:       { value: 320.0 },
		uFlakeReduction:  { value: 0.86 },
		uFlakeThreshold:  { value: 0.05 },
		uFlakeBrightness: { value: 0.2 },

		uMetalness:       { value: 0.2 },
		uRoughness:       { value: 0.35 },
		uEnvIntensity:    { value: 1.0 },
		uFoilStrength:    { value: 0.85 },

		uArtMin:          { value: new THREE.Vector2() },
		uArtMax:          { value: new THREE.Vector2() },
	},
	vertexShader,
	fragmentShader,
	transparent: true,
} );

material.uniforms.uCardTex.value = new THREE.HTMLTexture( card );

const mesh = new THREE.Mesh(
	new THREE.PlaneGeometry( elWidth / elHeight * 2.0, 2.0 ),
	material
);
scene.add( mesh );

// イラスト部分にはフォイル効果を適用したくないので、該当範囲の UV をシェーダーに渡す。
// .card-art-frame の位置を #card 基準の UV に変換して uniform へ反映
// UV は Three.js 標準: (0,0)=左下・(1,1)=右上
function syncArtBounds() {

	const cardRect = card.getBoundingClientRect();
	const artRect  = artFrame.getBoundingClientRect();

	const xMin = ( artRect.left  - cardRect.left ) / cardRect.width;
	const xMax = ( artRect.right - cardRect.left ) / cardRect.width;
	const yMin = 1.0 - ( artRect.bottom - cardRect.top ) / cardRect.height;
	const yMax = 1.0 - ( artRect.top    - cardRect.top ) / cardRect.height;

	material.uniforms.uArtMin.value.set( xMin, yMin );
	material.uniforms.uArtMax.value.set( xMax, yMax );

}

syncArtBounds();

// ---- DOM 同期 ----
// WebGL で描画している mesh の位置・回転に合わせて .card に CSS matrix3d を適用する。
// これにより DOM のヒットテスト位置が WebGL の見た目と一致する。
// https://github.com/WICG/html-in-canvas — getElementTransform()
const planeWidth  = elWidth / elHeight * 2.0;
const planeHeight = 2.0;

// element 座標 (top-left 原点, y-down, px) → mesh ローカル座標 (中心原点, y-up)
const elementToLocal = new DOMMatrix( [
	planeWidth / elWidth,  0,                       0, 0,
	0,                    -planeHeight / elHeight,  0, 0,
	0,                     0,                       1, 0,
	-planeWidth / 2,       planeHeight / 2,         0, 1,
] );

card.style.transformOrigin = '0 0';

function syncCardTransform() {

	const cssW = canvas.clientWidth;
	const cssH = canvas.clientHeight;

	// NDC → canvas CSS-pixel (top-left, y-down)
	const ndcToCanvas = new DOMMatrix( [
		cssW / 2, 0,         0, 0,
		0,       -cssH / 2,  0, 0,
		0,        0,         1, 0,
		cssW / 2, cssH / 2,  0, 1,
	] );

	// drawTransform = NDC→pixel · projection · view · model · element→local
	const drawTransform = ndcToCanvas
		.multiply( new DOMMatrix( [ ...camera.projectionMatrix.elements ] ) )
		.multiply( new DOMMatrix( [ ...camera.matrixWorldInverse.elements ] ) )
		.multiply( new DOMMatrix( [ ...mesh.matrixWorld.elements ] ) )
		.multiply( elementToLocal );

	card.style.transform = canvas.getElementTransform( card, drawTransform ).toString();

}

function animate( time ) {

	requestAnimationFrame( animate );

	const t = time * 0.001;
	mesh.rotation.y = Math.sin( t * 0.5 + 1.0 ) * Math.PI / 7;
	mesh.rotation.x = Math.sin( t * 0.3 ) * Math.PI / 10;

	material.uniforms.uTime.value = t;
	material.uniforms.uCameraPos.value.copy( camera.position );

	renderer.render( scene, camera );
	syncCardTransform();

}

requestAnimationFrame( animate );
</script>
</body>
</html>
