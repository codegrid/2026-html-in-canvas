<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML in Canvas — Card Demo</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>

<p class="PageNote">HTML in Canvas が有効なブラウザで表示してください</p>

<canvas class="CardCanvas" layoutsubtree>
	<div class="Card">
		<div class="Card__Inner">

			<div class="Card__Header">
				<input class="Card__Name" type="text" value="運命の分岐器">
				<input class="Card__Cost" type="text" value="④">
			</div>

			<div class="Card__ArtFrame">
				<img src="illus.webp" alt="">
			</div>

			<div class="Card__TypeBar">
				<input class="Card__Type" type="text" value="伝説のアーティファクト">
			</div>

			<div class="Card__TextBox">
				<textarea class="Card__Text">&#xE005;, &#xE000;：あなたは3点のライフを得る。または、いずれかの対象が受ける次のダメージを3点軽減する。
&#xE002;, &#xE000;：カードを3枚引く。
&#xE006;, &#xE000;：あなたのエネルギープールに&#xE006;&#xE006;&#xE006;を加える。
&#xE001;, &#xE000;：任意の対象1つに3点のダメージを与える。
&#xE003;, &#xE000;：対象1体はターン終了時まで+3/+3を得る。

“未来は無数に枝分かれする。だが、そのすべてを見通す者はほとんどいない。”</textarea>
			</div>

			<div class="Card__Bottom">
				<span>★ Rare</span>
				<span>Illus. Chat GPT</span>
			</div>

		</div>
	</div>
</canvas>

<button class="SaveButton">カードを保存</button>

<script type="module">
if ( ! ( 'requestPaint' in HTMLCanvasElement.prototype ) ) alert( 'HTML in Canvas が有効なブラウザで表示してください' );

const canvas = document.querySelector( '.CardCanvas' );
const ctx    = canvas.getContext( '2d' );
const card   = document.querySelector( '.Card' );

const elWidth  = card.offsetWidth;
const elHeight = card.offsetHeight;

canvas.style.width  = `${ elWidth }px`;
canvas.style.height = `${ elHeight }px`;

const resizeObserver = new ResizeObserver( ( [ entry ] ) => {

	const px = entry.devicePixelContentBoxSize[ 0 ];
	canvas.width  = px.inlineSize;
	canvas.height = px.blockSize;

} );

resizeObserver.observe( canvas, { box: 'device-pixel-content-box' } );

canvas.onpaint = () => {

	ctx.reset();
	const transform = ctx.drawElementImage( card, 0, 0 );
	card.style.transform = transform.toString();

};

document.querySelector( '.SaveButton' ).addEventListener( 'click', () => {

	const link = document.createElement( 'a' );
	link.download = 'card.png';
	link.href = canvas.toDataURL( 'image/png' );
	link.click();

} );
</script>

</body>
</html>
