<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML in Canvas — Water Distortion Demo</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>

<p class="PageNote">HTML in Canvas が有効なブラウザで表示してください</p>

<div class="Hero">
	<img src="./img.webp" alt="" />
	<div class="Hero__Text">
		<canvas class="Hero__TextCanvas" layoutsubtree>
				<div class="Hero__TextInner">
					<p class="Hero__Title">
						ひとくちで、<br />
						<em>潤う緑茶。</em>
					</p>
					<p class="Hero__Lead">
						みずみずしい香り、<br />
						すっとほどける軽やかさ。
					</p>
					<p class="Hero__Description">
						<a href="#">小山田園</a>の茶葉のみを使用した緑茶。<br />
						玉露の甘みと、煎茶の爽やかさを併せ持つ、<br />
						みずみずしい味わいが特徴です。
					</p>
					<a href="#" class="Hero__Link">
						新しい一杯を味わう
					</a>
			</div>
		</canvas>
	</div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js';

const canvas  = document.querySelector( '.Hero__TextCanvas' );
const content = document.querySelector( '.Hero__TextInner' );

const renderer = new THREE.WebGLRenderer( { canvas, antialias: true, alpha: true } );
renderer.setPixelRatio( window.devicePixelRatio );
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

// r184 monkey patch for Chrome 150+
const gl = renderer.getContext();
if ( 'texElementImage2D' in gl && gl.texElementImage2D.length === 3 ) {

	const _orig = gl.texElementImage2D.bind( gl );
	gl.texElementImage2D = function () {

		const args = Array.from( arguments );
		if ( args.length >= 6 && args[ 5 ] instanceof Element ) {

			_orig( args[ 0 ], gl.RGBA8, args[ 5 ] );

		} else {

			_orig.apply( gl, args );

		}

	};

}

const fov    = 50;
const camera = new THREE.PerspectiveCamera( fov, 1, 0.1, 10000 );

const scene = new THREE.Scene();

// --- テキスト板メッシュ ---
const texture  = new THREE.HTMLTexture( content );
texture.colorSpace = THREE.SRGBColorSpace;
const planeMat = new THREE.ShaderMaterial( {

	uniforms: {
		uMap: { value: texture },
		uTime: { value: 0 },
	},
	vertexShader: /* glsl */`
		varying vec2 vUv;

		void main() {

			vUv = uv;
			gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );

		}
	`,
	fragmentShader: /* glsl */`
		uniform sampler2D uMap;
		uniform float uTime;
		varying vec2 vUv;

		// 2D ハッシュ: セル ID から疑似乱数を生成
		float hash( vec2 c ) {

			return fract( sin( dot( c, vec2( 127.1, 311.7 ) ) ) * 43758.5453 );

		}

		// セルベースの波: 各セルにランダムな進行方向・位相・速度を割り当て
		// 2x2 の隣接セルをバイリニア補間して海面のような滑らかな方向ゆらぎを得る
		// セル格子は時間とともにドリフトさせ、固定位置で同じパターンが繰り返さないようにする
		vec2 wave( vec2 p, float t ) {

			const float scale = 5.0;                      // 単位 uv あたりのセル数
			const float amp   = 0.0035;                   // 振幅
			const float freq  = 12.0;                     // セル内の波数スケール
			const vec2  drift = vec2( 0.30, 0.18 );       // セル単位 / 秒 の流れ

			vec2 q  = p * scale + drift * t;
			vec2 id = floor( q );
			vec2 fr = fract( q );

			vec2 d = vec2( 0.0 );

			for ( int j = 0; j < 2; j ++ ) {

				for ( int i = 0; i < 2; i ++ ) {

					vec2  o     = vec2( float( i ), float( j ) );
					vec2  nid   = id + o;
					float ang   = hash( nid )        * 6.2832;
					vec2  dir   = vec2( cos( ang ), sin( ang ) );
					float phase = hash( nid + 13.7 ) * 6.2832;
					float speed = 1.5 + hash( nid + 5.3 ) * 2.0;

					float w = ( 1.0 - abs( o.x - fr.x ) )
									* ( 1.0 - abs( o.y - fr.y ) );

					float s = sin( dot( q * freq, dir ) + phase - t * speed );
					d += dir * s * w * amp;

				}

			}

			return d;

		}

		// 歪み方向と光源の内積を 0..1 にクランプして反射強度に
		float lit( vec2 d, vec2 L ) {

			return clamp( dot( d, L ) * 500.0, 0.0, 1.0 );

		}

		void main() {

			float t = uTime;
			vec2  L = normalize( vec2( -1.0, 1.0 ) );

			vec2 d  = wave( vUv, t );
			vec2 uv = vUv + d;

			// 9 サンプル (中央 + cardinal + diagonal) で広い halo を作る
			float h0 = lit( d, L );
			const float r = 0.050;
			const float c = 0.035; // r/sqrt(2): 周囲 8 サンプルを等距離にする
			float h1 = lit( wave( vUv + vec2(  r, 0.0 ), t ), L );
			float h2 = lit( wave( vUv + vec2( -r, 0.0 ), t ), L );
			float h3 = lit( wave( vUv + vec2( 0.0,  r ), t ), L );
			float h4 = lit( wave( vUv + vec2( 0.0, -r ), t ), L );
			float h5 = lit( wave( vUv + vec2(  c,  c ), t ), L );
			float h6 = lit( wave( vUv + vec2( -c,  c ), t ), L );
			float h7 = lit( wave( vUv + vec2(  c, -c ), t ), L );
			float h8 = lit( wave( vUv + vec2( -c, -c ), t ), L );

			// sharp: 中央の鋭いピーク / bloom: 9 サンプル平均の広い halo
			float sharp = pow( h0, 3.0 ) * 0.10;
			float bloom = pow( h0, 2.0 )
				+ pow( h1, 2.0 ) + pow( h2, 2.0 ) + pow( h3, 2.0 ) + pow( h4, 2.0 )
				+ pow( h5, 2.0 ) + pow( h6, 2.0 ) + pow( h7, 2.0 ) + pow( h8, 2.0 );
			bloom *= 0.03;

			vec4 src = texture2D( uMap, uv );

			// wet: 歪みが強い部分はわずかに彩度アップ (黒ずませない)
			float wetness = clamp( length( d ) * 500.0, 0.0, 1.0 );
			float lum = dot( src.rgb, vec3( 0.299, 0.587, 0.114 ) );
			src.rgb = mix( vec3( lum ), src.rgb, 1.0 + wetness * 0.2 );

			// 下地色を白へ 70% 寄せた tint で光らせる
			vec3 hlColor = mix( src.rgb, vec3( 1.0 ), 0.7 );
			vec3 glow    = hlColor * ( sharp + bloom );

			// テキスト alpha でマスクして add
			gl_FragColor = vec4( src.rgb + glow * src.a, src.a );

		}
	`,
	transparent: true,

} );
const plane = new THREE.Mesh( new THREE.PlaneGeometry( 1, 1 ), planeMat );
scene.add( plane );

const clock = new THREE.Clock();

// --- onpaint wrap ---
let painted = false;
const _htmlTexturePaint = canvas.onpaint;
canvas.onpaint = ( e ) => {

	painted = true;
	if ( _htmlTexturePaint ) _htmlTexturePaint.call( canvas, e );

};

function setSize() {

	const w = content.offsetWidth;
	const h = content.offsetHeight;

	canvas.style.height = `${ h }px`;
	renderer.setSize( w, h, false );

	const z = h / ( 2 * Math.tan( THREE.MathUtils.degToRad( fov / 2 ) ) );
	camera.aspect = w / h;
	camera.near   = z / 100;
	camera.far    = z * 100;
	camera.position.z = z;
	camera.updateProjectionMatrix();

	plane.geometry.dispose();
	plane.geometry = new THREE.PlaneGeometry( w, h );

}

new ResizeObserver( setSize ).observe( content );

renderer.setAnimationLoop( () => {

	if ( ! painted ) return;
	planeMat.uniforms.uTime.value = clock.getElapsedTime();
	renderer.render( scene, camera );

} );
</script>
</body>
</html>
