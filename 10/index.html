<title>HTML in Canvas — Retro Game Effect Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

body {
	margin: 0;
	background: url( "./bg.png" );
	font-family: 'DotGothic16', monospace;
}

.OpenButton {
	display: block;
	width: fit-content;
	padding: 16px 24px;
	margin: 64px auto 0;
	border: none;
	font-family: inherit;
	font-size: 16px;
	color: #fff;
	background: #d23f5b;
	cursor: pointer;
	box-shadow:
		0 0 0 4px #1a1a3e,
		0 0 0 8px #fff,
		0 0 0 12px #1a1a3e;
}

.OpenButton:hover {
	background: #ec5c79;
}

.OpenButton:active {
	transform: translate( 2px, 2px );
}

/* ===== Retro 8-bit dialog ===== */

.RetroDialog {
	position: fixed;
	inset: 0;
	z-index: 100;
	display: none;
	align-items: center;
	justify-content: center;
	color: #fff;
	font-family: inherit;
	opacity: 0;
	transition:
		opacity .5s .5s,
		display 1s allow-discrete;
}

.RetroDialog.-open {
	display: flex;
	opacity: 1;
	/* transition: opacity .5s .5s; */
	transition:
		opacity .5s,
		display 1s allow-discrete;
}

.RetroDialog__Canvas {
	display: block;
}

.RetroDialog__Frame {
	width: min( 480px, 90vw );
	padding: 0 64px;
}

.RetroDialog__FrameInner {
	position: relative;
	box-sizing: border-box;
	padding: 32px;
	background: #1a1a3e;

}

.RetroDialog__Icon {
	display: flex;
	justify-content: center;
}

.RetroDialog__Body {
	margin: 0 0 16px;
	padding: 16px;
	font-size: 16px;
	line-height: 1.9;
	letter-spacing: 0.04em;
	background: #0c0c24;
	box-shadow: inset 0 0 0 2px #5a5a8e;
}

@keyframes blink {

	0%, 50%   { opacity: 1; }
	51%, 100% { opacity: 0; }

}

.RetroDialog__Cursor {
	display: inline-block;
	margin-left: 4px;
	color: #ffe14a;
	animation: blink 0.8s steps( 1 ) infinite;
}

.RetroDialog__Actions {
	display: flex;
	gap: 16px;
	justify-content: center;
	margin: 0;
	padding: 0;
	list-style: none;
}

.RetroDialog__Actions li {
	flex: 1;
	max-width: 160px;
}

.RetroButton {
	display: block;
	width: 100%;
	padding: 12px 20px;
	border: none;
	font-family: inherit;
	font-size: 16px;
	letter-spacing: 0.08em;
	color: #1a1a3e;
	background: #fff;
	cursor: pointer;
	box-shadow:
		0 0 0 3px #1a1a3e,
		0 0 0 6px #fff;
}

.RetroButton:hover {
	color: #1a1a3e;
	background: #ffe14a;
}

.RetroButton:active {
	transform: translate( 2px, 2px );
}

.RetroButton.-ghost {
	color: #fff;
	background: #1a1a3e;
	box-shadow:
		0 0 0 3px #fff,
		0 0 0 6px #1a1a3e;
}

.RetroButton.-ghost:hover {
	color: #1a1a3e;
	background: #fff;
}
</style>
</head>
<body>

<p class="PageNote">HTML in Canvas が有効なブラウザで表示してください</p>


<button type="button" class="OpenButton">
	dialog を ひらく
</button>

<div class="RetroDialog" role="dialog" aria-modal="true">
	<canvas class="RetroDialog__Canvas" layoutsubtree>
		<div class="RetroDialog__Frame">
			<div class="RetroDialog__FrameInner">
				<div class="RetroDialog__Icon">
					<img src="./img.png" alt="" />
				</div>
				<p class="RetroDialog__Body">
					コードグリッド を しっていますか？<span class="RetroDialog__Cursor">▼</span>
				</p>
				<menu class="RetroDialog__Actions">
					<li>
						<button type="button" class="RetroButton">
							はい
						</button>
					</li>
					<li>
						<button type="button" class="RetroButton -ghost">
							いいえ
						</button>
					</li>
				</menu>
			</div>
		</div>
	</canvas>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js';

if ( ! ( 'requestPaint' in HTMLCanvasElement.prototype ) ) alert( 'HTML in Canvas が有効なブラウザで表示してください' );

const openButton   = document.querySelector( '.OpenButton' );
const modal        = document.querySelector( '.RetroDialog' );
const canvas       = document.querySelector( '.RetroDialog__Canvas' );
const frame        = document.querySelector( '.RetroDialog__Frame' );
const closeButtons = modal.querySelectorAll( '.RetroButton' );

openButton.addEventListener( 'click', () => {

	modal.classList.add( '-open' );

} );

closeButtons.forEach( ( button ) => {

	button.addEventListener( 'click', () => modal.classList.remove( '-open' ) );

} );

// ===== Three.js + HTML in Canvas =====

const renderer = new THREE.WebGLRenderer( { canvas, antialias: true, alpha: true } );
renderer.setPixelRatio( window.devicePixelRatio );
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

// r184 monkey patch for Chrome 150+
const gl = renderer.getContext();
if ( 'texElementImage2D' in gl && gl.texElementImage2D.length === 3 ) {

	const _orig = gl.texElementImage2D.bind( gl );
	gl.texElementImage2D = function () {

		const args = Array.from( arguments );
		if ( args.length >= 6 && args[ 5 ] instanceof Element ) {

			_orig( args[ 0 ], gl.RGBA8, args[ 5 ] );

		} else {

			_orig.apply( gl, args );

		}

	};

}

const camera = new THREE.OrthographicCamera();
camera.position.z = 1;
const scene  = new THREE.Scene();

const texture = new THREE.HTMLTexture( frame );
texture.colorSpace = THREE.SRGBColorSpace;

// uProgress: 0 = 完全に渦巻いた状態 (旅の扉)、1 = 通常表示
const material = new THREE.ShaderMaterial( {

	uniforms: {
		uMap:      { value: texture },
		uProgress: { value: 0 },
		uTexSize:  { value: new THREE.Vector2( 1, 1 ) },
	},

	vertexShader: /* glsl */`
		varying vec2 vUv;
		void main() {
			vUv = uv;
			gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
		}
	`,

	fragmentShader: /* glsl */`
		uniform sampler2D uMap;
		uniform float     uProgress;
		uniform vec2      uTexSize;
		varying vec2      vUv;

		void main() {

			float p     = uProgress;
			float invP  = 1.0 - p;
			float invP2 = invP * invP;

			// 8-bit ドット: CSS 4px を 1 ドットとして量子化
			const float DOT = 4.0;
			vec2 dots = uTexSize / DOT;

			// 横揺れ: y を dot 単位で量子化し、x の変位も dot 単位に丸める
			// 波の数 (freq) は p=0 で多く、p=1 に向けて減る
			float yq = floor( vUv.y * dots.y ) / dots.y;
			float freq = mix( 4.0, 80.0, invP );
			float displacement = sin( yq * freq ) * invP2 * 0.15;
			displacement = floor( displacement * dots.x + 0.5 ) / dots.x;

			vec2 uv = vUv;
			uv.x += displacement;

			// 範囲外は透過
			if ( uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0 ) discard;

			vec4 col = texture2D( uMap, uv );

			// ピーク時のシアン寄りフラッシュ (旅の扉感)
			col.rgb += vec3( 0.3, 0.6, 1.0 ) * invP2 * 0.7;

			gl_FragColor = col;

		}
	`,

	transparent: true,

} );

const plane = new THREE.Mesh( new THREE.PlaneGeometry( 1, 1 ), material );
scene.add( plane );

let painted = false;
const _htmlTexturePaint = canvas.onpaint;
canvas.onpaint = ( e ) => {

	// frame に実寸がある時だけ painted を立てる。
	// modal が display:none の状態で requestPaint() が空打ちされても
	// painted が立たないように防御。
	if ( frame.offsetWidth > 0 && frame.offsetHeight > 0 ) painted = true;
	if ( _htmlTexturePaint ) _htmlTexturePaint.call( canvas, e );

};

function setSize() {

	const w = frame.offsetWidth;
	const h = frame.offsetHeight;
	if ( w === 0 || h === 0 ) return;

	canvas.style.width  = `${ w }px`;
	canvas.style.height = `${ h }px`;
	renderer.setSize( w, h, false );

	material.uniforms.uTexSize.value.set( w, h );

	camera.left   = - w / 2;
	camera.right  =   w / 2;
	camera.top    =   h / 2;
	camera.bottom = - h / 2;
	camera.updateProjectionMatrix();

	plane.geometry.dispose();
	plane.geometry = new THREE.PlaneGeometry( w, h );

}

new ResizeObserver( setSize ).observe( frame );

const timer       = new THREE.Timer();
const TWIST_SPEED = 1.0; // 1 / 秒 — 1秒で 0 ⇄ 1 を遷移

renderer.setAnimationLoop( () => {

	timer.update();
	const dt      = timer.getDelta();
	const target  = modal.classList.contains( '-open' ) ? 1 : 0;
	const current = material.uniforms.uProgress.value;

	if ( current !== target ) {

		const step = Math.min( Math.abs( target - current ), dt * TWIST_SPEED );
		material.uniforms.uProgress.value = current + Math.sign( target - current ) * step;

	}

	if ( ! painted ) return;
	if ( frame.offsetWidth === 0 || frame.offsetHeight === 0 ) return;

	try {

		renderer.render( scene, camera );

	} catch ( e ) {

		// modal が閉じている間に paint record が無効化されたケース。
		// 次の onpaint まで render を止めて自己修復。
		if ( e.name === 'InvalidStateError' ) {

			painted = false;
			return;

		}

		throw e;

	}

} );
</script>
</body>
</html>
