<title>HTML in Canvas — Retro Game Effect Demo</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>

<p class="PageNote">HTML in Canvas が有効なブラウザで表示してください</p>


<button type="button" class="OpenButton">
	dialog を ひらく
</button>

<div class="RetroDialog" role="dialog" aria-modal="true">
	<canvas class="RetroDialog__Canvas" layoutsubtree>
		<div class="RetroDialog__Frame">
			<div class="RetroDialog__FrameInner">
				<div class="RetroDialog__Icon">
					<img src="./img.png" alt="" />
				</div>
				<p class="RetroDialog__Body">
					コードグリッド を しっていますか？<span class="RetroDialog__Cursor">▼</span>
				</p>
				<menu class="RetroDialog__Actions">
					<li>
						<button type="button" class="RetroButton">
							はい
						</button>
					</li>
					<li>
						<button type="button" class="RetroButton -ghost">
							いいえ
						</button>
					</li>
				</menu>
			</div>
		</div>
	</canvas>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js';

if ( ! ( 'requestPaint' in HTMLCanvasElement.prototype ) ) alert( 'HTML in Canvas が有効なブラウザで表示してください' );

const openButton   = document.querySelector( '.OpenButton' );
const modal        = document.querySelector( '.RetroDialog' );
const canvas       = document.querySelector( '.RetroDialog__Canvas' );
const frame        = document.querySelector( '.RetroDialog__Frame' );
const closeButtons = modal.querySelectorAll( '.RetroButton' );

openButton.addEventListener( 'click', () => {

	modal.classList.add( '-open' );

} );

closeButtons.forEach( ( button ) => {

	button.addEventListener( 'click', () => modal.classList.remove( '-open' ) );

} );

// ===== Three.js + HTML in Canvas =====

const renderer = new THREE.WebGLRenderer( { canvas, antialias: true, alpha: true } );
renderer.setPixelRatio( window.devicePixelRatio );
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

const camera = new THREE.OrthographicCamera();
camera.position.z = 1;
const scene  = new THREE.Scene();

const texture = new THREE.HTMLTexture( frame );
texture.colorSpace = THREE.SRGBColorSpace;

// uProgress: 0 = 完全に渦巻いた状態 (旅の扉)、1 = 通常表示
const material = new THREE.ShaderMaterial( {

	uniforms: {
		uMap:      { value: texture },
		uProgress: { value: 0 },
		uTexSize:  { value: new THREE.Vector2( 1, 1 ) },
	},

	vertexShader: /* glsl */`
		varying vec2 vUv;
		void main() {
			vUv = uv;
			gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
		}
	`,

	fragmentShader: /* glsl */`
		uniform sampler2D uMap;
		uniform float     uProgress;
		uniform vec2      uTexSize;
		varying vec2      vUv;

		void main() {

			float p     = uProgress;
			float invP  = 1.0 - p;
			float invP2 = invP * invP;

			// 8-bit ドット: CSS 4px を 1 ドットとして量子化
			const float DOT = 4.0;
			vec2 dots = uTexSize / DOT;

			// 横揺れ: y を dot 単位で量子化し、x の変位も dot 単位に丸める
			// 波の数 (freq) は p=0 で多く、p=1 に向けて減る
			float yq = floor( vUv.y * dots.y ) / dots.y;
			float freq = mix( 4.0, 80.0, invP );
			float displacement = sin( yq * freq ) * invP2 * 0.15;
			displacement = floor( displacement * dots.x + 0.5 ) / dots.x;

			vec2 uv = vUv;
			uv.x += displacement;

			// 範囲外は透過
			if ( uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0 ) discard;

			vec4 col = texture2D( uMap, uv );

			// ピーク時のシアン寄りフラッシュ (旅の扉感)
			col.rgb += vec3( 0.3, 0.6, 1.0 ) * invP2 * 0.7;

			gl_FragColor = col;

		}
	`,

	transparent: true,

} );

const plane = new THREE.Mesh( new THREE.PlaneGeometry( 1, 1 ), material );
scene.add( plane );

let painted = false;
const _htmlTexturePaint = canvas.onpaint;
canvas.onpaint = ( e ) => {

	// frame に実寸がある時だけ painted を立てる。
	// modal が display:none の状態で requestPaint() が空打ちされても
	// painted が立たないように防御。
	if ( frame.offsetWidth > 0 && frame.offsetHeight > 0 ) painted = true;
	if ( _htmlTexturePaint ) _htmlTexturePaint.call( canvas, e );

};

function setSize() {

	const w = frame.offsetWidth;
	const h = frame.offsetHeight;
	if ( w === 0 || h === 0 ) return;

	canvas.style.width  = `${ w }px`;
	canvas.style.height = `${ h }px`;
	renderer.setSize( w, h, false );

	material.uniforms.uTexSize.value.set( w, h );

	camera.left   = - w / 2;
	camera.right  =   w / 2;
	camera.top    =   h / 2;
	camera.bottom = - h / 2;
	camera.updateProjectionMatrix();

	plane.geometry.dispose();
	plane.geometry = new THREE.PlaneGeometry( w, h );

}

new ResizeObserver( setSize ).observe( frame );

const timer       = new THREE.Timer();
const TWIST_SPEED = 1.0; // 1 / 秒 — 1秒で 0 ⇄ 1 を遷移

renderer.setAnimationLoop( () => {

	timer.update();
	const dt      = timer.getDelta();
	const target  = modal.classList.contains( '-open' ) ? 1 : 0;
	const current = material.uniforms.uProgress.value;

	if ( current !== target ) {

		const step = Math.min( Math.abs( target - current ), dt * TWIST_SPEED );
		material.uniforms.uProgress.value = current + Math.sign( target - current ) * step;

	}

	if ( ! painted ) return;
	if ( frame.offsetWidth === 0 || frame.offsetHeight === 0 ) return;

	try {

		renderer.render( scene, camera );

	} catch ( e ) {

		// modal が閉じている間に paint record が無効化されたケース。
		// 次の onpaint まで render を止めて自己修復。
		if ( e.name === 'InvalidStateError' ) {

			painted = false;
			return;

		}

		throw e;

	}

} );
</script>
</body>
</html>
