<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML in Canvas — Slime Drip Demo</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>

<p class="PageNote">HTML in Canvas が有効なブラウザで表示してください</p>

<canvas class="SlimeCanvas" layoutsubtree>
	<div class="SlimeText">
		<p>つらい<em>鼻水</em>、鼻詰まり</p>
	</div>
</canvas>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js';

const canvas = document.querySelector( '.SlimeCanvas' );
const textEl = document.querySelector( '.SlimeText' );
const emEl   = textEl.querySelector( 'em' );

const renderer = new THREE.WebGLRenderer( { canvas, antialias: true, alpha: true } );
renderer.setPixelRatio( window.devicePixelRatio );
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

// r184 + Chrome 150+: texElementImage2D シグネチャ変更への monkey patch
const gl = renderer.getContext();
if ( 'texElementImage2D' in gl && gl.texElementImage2D.length === 3 ) {

	const _orig = gl.texElementImage2D.bind( gl );
	gl.texElementImage2D = function () {

		const args = Array.from( arguments );
		if ( args.length >= 6 && args[ 5 ] instanceof Element ) {

			_orig( args[ 0 ], gl.RGBA8, args[ 5 ] );

		} else {

			_orig.apply( gl, args );

		}

	};

}

// --- Orthographic camera: NDC 直接 ---
const camera = new THREE.OrthographicCamera( - 1, 1, 1, - 1, - 1, 1 );

const uTime = { value: 0 };

// --- ランタイム調整パラメータ (window.slime から書き換え可能) ---
// 色 / 粘度 / 凹凸 はすべて uniform として shader に渡され、後から DevTools / 別 script から変更可能。
// 使い方:
//   slime.viscosity.value      = 2.0;     // 粘度 (落下スピード + 横揺れ振幅)
//   slime.bumpiness.value      = 1.2;     // 大きな凹凸 (うねり / 表面のリッジ)
//   slime.microBumpiness.value = 0.4;     // 微細な凹凸 (粒状感、ザラつき)
//   slime.setThick( '#16a34a' );          // 内部色 (sRGB hex)
//   slime.setThin ( '#bbf7d0' );          // 縁色   (sRGB hex)
//   slime.setSpec ( '#88cc88' );          // 光沢色 (sRGB hex)
// 注: outputColorSpace=LinearSRGB のため、sRGB hex は内部で convertLinearToSRGB により
// encode 済の値として uniform に格納される。
const slime = {
	// 粘度: 落下スピードと横揺れだけに作用する (凹凸とは独立)
	viscosity: { value: .75 },
	// 凹凸: density 場のスクリーン勾配を法線にどれだけ反映するか。0 で完全フラット、 1 で標準。
	bumpiness:      { value: 0.3 },  // 大スケール (周辺サンプリング)
	microBumpiness: { value: 0.1 },  // 微細スケール (1px の dFdx/dFdy)
	// スライム色 uniform (水色寄りの透明鼻水: クリアで爽やかな水色)
	thinColor:  { value: new THREE.Color( 0xcee2ec ).convertLinearToSRGB() },  // 縁: 透明感のある淡い水色
	thickColor: { value: new THREE.Color( 0x5b9cc4 ).convertLinearToSRGB() },  // 内部: 澄んだ空色
	specColor:  { value: new THREE.Color( 0xe6f1f5 ).convertLinearToSRGB() },  // 光沢: 冷たい白〜青ハイライト

	setThin:  function ( hex ) { this.thinColor.value.set ( hex ).convertLinearToSRGB(); },
	setThick: function ( hex ) { this.thickColor.value.set( hex ).convertLinearToSRGB(); },
	setSpec:  function ( hex ) { this.specColor.value.set ( hex ).convertLinearToSRGB(); },
};
window.slime = slime;

// --- HTMLTexture (テキスト下地) ---
const textTexture = new THREE.HTMLTexture( textEl );
textTexture.colorSpace = THREE.SRGBColorSpace;

// --- 粒子定数 ---
const PARTICLE_COUNT = 5000;
const LIFETIME = 7.0;
const MAX_FALL = 1.7;        // NDC 単位での落下総距離 (生涯)
const ALPHA_THRESHOLD = 128;
const POINT_SIZE = 24.0;     // blob sprite サイズ (low-res RT 上の device px)

// --- 粒子バッファ ---
const particleGeometry = new THREE.BufferGeometry();
const aHome  = new Float32Array( PARTICLE_COUNT * 2 );
const aSeed  = new Float32Array( PARTICLE_COUNT * 2 );
const aPhase = new Float32Array( PARTICLE_COUNT );

for ( let i = 0; i < PARTICLE_COUNT; i ++ ) {

	aSeed[ i * 2     ] = Math.random();
	aSeed[ i * 2 + 1 ] = Math.random();
	aPhase[ i ] = Math.random();

}

const homeAttr  = new THREE.BufferAttribute( aHome,  2 );
const seedAttr  = new THREE.BufferAttribute( aSeed,  2 );
const phaseAttr = new THREE.BufferAttribute( aPhase, 1 );

particleGeometry.setAttribute( 'position', new THREE.BufferAttribute( new Float32Array( PARTICLE_COUNT * 3 ), 3 ) );
particleGeometry.setAttribute( 'aHome',  homeAttr  );
particleGeometry.setAttribute( 'aSeed',  seedAttr  );
particleGeometry.setAttribute( 'aPhase', phaseAttr );

// --- Pass 1: blob を additive で half-res RT に焼く ---
const blobMaterial = new THREE.ShaderMaterial( {

	uniforms: {
		uTime,
		uLifetime: { value: LIFETIME },
		uMaxFall:  { value: MAX_FALL },
		uPointSize:{ value: POINT_SIZE },
		uHomeReady:{ value: 0 },
		uViscosity: slime.viscosity,
	},
	vertexShader: /* glsl */`
		attribute vec2 aHome;
		attribute vec2 aSeed;
		attribute float aPhase;

		uniform float uTime;
		uniform float uLifetime;
		uniform float uMaxFall;
		uniform float uPointSize;
		uniform float uHomeReady;
		uniform float uViscosity;

		varying float vDensity;

		float hash( vec2 p ) {

			return fract( sin( dot( p, vec2( 127.1, 311.7 ) ) ) * 43758.5453 );

		}

		float noise( vec2 p ) {

			vec2 i = floor( p );
			vec2 f = fract( p );
			float a = hash( i );
			float b = hash( i + vec2( 1.0, 0.0 ) );
			float c = hash( i + vec2( 0.0, 1.0 ) );
			float d = hash( i + vec2( 1.0, 1.0 ) );
			vec2 u = f * f * ( 3.0 - 2.0 * f );
			return mix( mix( a, b, u.x ), mix( c, d, u.x ), u.y );

		}

		void main() {

			// 粘度: 寿命を引き延ばすほど 1 サイクルが長くなり、落下も横揺れもゆっくりになる
			float effLifetime = uLifetime * uViscosity;
			float t = fract( uTime / effLifetime + aPhase );

			// aHome (0..1, image space y=0 top → ndc.y=-1) → ndc (+y up)
			vec2 home_ndc = ( aHome - 0.5 ) * 2.0;

			// 落下: ease-in で粒子は徐々に加速。t=0 で home、t=1 で uMaxFall 下
			float fall = pow( t, 1.4 ) * uMaxFall;

			// 水平ドリフト: 落下距離に応じて広がる蛇行。粘度が高いほど振幅も減る (べたつく)
			float wobSeed = aSeed.x * 17.0 + aSeed.y * 31.0;
			float wob1 = sin( wobSeed + uTime * 0.6 / uViscosity + fall * 3.5 );
			float wob2 = sin( wobSeed * 1.7 + uTime * 0.2 / uViscosity ) * 0.5;
			float wob = ( wob1 + wob2 ) * fall * 0.05 / uViscosity;

			vec2 pos = home_ndc + vec2( wob, - fall );

			gl_Position = vec4( pos, 0.0, 1.0 );

			// blob 半径も density も落下中ずっとフルサイズ維持。
			// 画面下方向のフェードは threshold pass で screen-y ベースで掛ける (alpha と位置が一致する)。
			float lifeFade = smoothstep( 0.0, 0.04, t ) * ( 1.0 - smoothstep( 0.95, 1.0, t ) );

			vDensity = lifeFade * uHomeReady;

			gl_PointSize = uPointSize;

		}
	`,
	fragmentShader: /* glsl */`
		varying float vDensity;

		void main() {

			vec2 c = gl_PointCoord - 0.5;
			float d2 = dot( c, c );
			if ( d2 > 0.25 ) discard;

			// gaussian falloff: r=0 で 1, r=0.5 で ~e^-2 ≈ 0.135
			float falloff = exp( - d2 * 8.0 );

			// additive blend で R に density 蓄積
			gl_FragColor = vec4( falloff * vDensity, 0.0, 0.0, 1.0 );

		}
	`,
	transparent: true,
	depthWrite: false,
	depthTest: false,
	blending: THREE.CustomBlending,
	blendSrc: THREE.OneFactor,
	blendDst: THREE.OneFactor,
	blendEquation: THREE.AddEquation,

} );

const particles = new THREE.Points( particleGeometry, blobMaterial );

const blobScene = new THREE.Scene();
blobScene.add( particles );

// blob RT: HalfFloat で additive 蓄積 (UnsignedByte だと 1.0 で saturate して厚みが出ない)
const blobRT = new THREE.WebGLRenderTarget( 2, 2, {
	type: THREE.HalfFloatType,
	format: THREE.RGBAFormat,
	minFilter: THREE.LinearFilter,
	magFilter: THREE.LinearFilter,
} );

// --- Pass 2: density → 文字下地と合成して画面へ ---
const thresholdMaterial = new THREE.ShaderMaterial( {

	uniforms: {
		uDensityMap:   { value: blobRT.texture },
		uTextMap:      { value: textTexture },
		uThreshold:    { value: 0.35 },
		uThicknessRange: { value: 1.6 },
		// 蛍光緑のスライム。outputColorSpace=LinearSRGB で fb にそのまま書くので
		// HTML/CSS 側で見たい色 (sRGB) を convertLinearToSRGB() でエンコードして渡す。
		// thin / thick / spec の各色は slime オブジェクトと共有 → window.slime から動的に変更可。
		uThinColor:    slime.thinColor,
		uThickColor:   slime.thickColor,
		uSpecColor:    slime.specColor,
		uBgColor:      { value: new THREE.Color( 0x010203 ).convertLinearToSRGB() },
		uLightDir:     { value: new THREE.Vector3( 0.25, 0.7, 1.0 ).normalize() },
		uSlimeAlpha:   { value: 0.82 },
		// 凹凸 (法線勾配の大スケール / 微細スケール) を独立にコントロール。粘度とは無関係。
		uBumpiness:      slime.bumpiness,
		uMicroBumpiness: slime.microBumpiness,
		// blob RT の texel サイズ (大スケール勾配サンプリングで使う、 syncCanvasSize で更新)
		uTexelSize:      { value: new THREE.Vector2( 0.5, 0.5 ) },
	},
	vertexShader: /* glsl */`
		varying vec2 vUv;
		void main() {
			vUv = uv;
			gl_Position = vec4( position.xy, 0.0, 1.0 );
		}
	`,
	fragmentShader: /* glsl */`
		precision highp float;

		uniform sampler2D uDensityMap;
		uniform sampler2D uTextMap;
		uniform float uThreshold;
		uniform float uThicknessRange;
		uniform vec3 uThinColor;
		uniform vec3 uThickColor;
		uniform vec3 uSpecColor;
		uniform vec3 uBgColor;
		uniform vec3 uLightDir;
		uniform float uSlimeAlpha;
		uniform float uBumpiness;
		uniform float uMicroBumpiness;
		uniform vec2 uTexelSize;

		varying vec2 vUv;

		void main() {

			// 下地: 透明な部分は背景色、不透明な部分はテキスト色を pre-multiplied で合成
			vec4 textTex = texture2D( uTextMap, vUv );
			vec3 baseColor = mix( uBgColor, textTex.rgb, textTex.a );

			float density = texture2D( uDensityMap, vUv ).r;

			if ( density < uThreshold ) {

				gl_FragColor = vec4( baseColor, 1.0 );
				return;

			}

			// 厚み: density - threshold で内部側を 0..1 にマップ
			float thickness = clamp( ( density - uThreshold ) / uThicknessRange, 0.0, 1.0 );
			vec3 slimeColor = mix( uThinColor, uThickColor, thickness );

			// 法線推定: density 場の screen-space 勾配を 2 つのスケールで取って合成する。
			//   macroGrad : 数 px 離れた点同士の差 (大スケールうねり)        → uBumpiness
			//   microGrad : 1 px 隣との差 (dFdx/dFdy, 粒状感)                → uMicroBumpiness
			// それぞれ独立に uniform で強度を変えられる。粘度とは独立。
			const float MACRO_OFFSET = 3.0;
			float dL = texture2D( uDensityMap, vUv + vec2( - MACRO_OFFSET, 0.0 ) * uTexelSize ).r;
			float dR = texture2D( uDensityMap, vUv + vec2(   MACRO_OFFSET, 0.0 ) * uTexelSize ).r;
			float dD = texture2D( uDensityMap, vUv + vec2( 0.0, - MACRO_OFFSET ) * uTexelSize ).r;
			float dU = texture2D( uDensityMap, vUv + vec2( 0.0,   MACRO_OFFSET ) * uTexelSize ).r;
			vec2 macroGrad = vec2( dR - dL, dU - dD ) * ( 0.5 / MACRO_OFFSET );

			vec2 microGrad = vec2( dFdx( density ), dFdy( density ) );

			vec2 totalGrad = macroGrad * uBumpiness + microGrad * uMicroBumpiness;
			vec3 N = normalize( vec3( - totalGrad.x, totalGrad.y, 1.0 ) );

			vec3 V = vec3( 0.0, 0.0, 1.0 );
			vec3 H = normalize( uLightDir + V );

			float diffuse = max( dot( N, uLightDir ), 0.0 );
			float spec = pow( max( dot( N, H ), 0.0 ), 22.0 );
			// spec は厚い部分だけ。縁 (thickness 小) では 0 に抑えて白く浮かないようにする
			spec *= smoothstep( 0.2, 0.55, thickness );

			vec3 shaded = slimeColor * ( 0.45 + 0.55 * diffuse ) + uSpecColor * spec * 0.45;

			// 縁を背景に馴染ませる:
			//   1. 色フェードを wide に。thin 領域 (thickness < 0.7) で uBgColor を混入し、明色の縁が背景に溶け込む。
			//   2. alpha もさらに wide にして縁を透明寄りに → 結果として明色領域は bg そのものに近づく。
			vec3 edgeBlended = mix( uBgColor, shaded, smoothstep( 0.05, 0.7, thickness ) );

			float slimeAlpha = uSlimeAlpha * smoothstep( 0.0, 0.85, thickness );
			slimeAlpha *= mix( 1.0, 0.55, textTex.a );

			// 画面下方向の alpha 減衰: 上から 70% 地点 (ndc.y = -0.4) で 1、画面下端 (ndc.y = -1.0) で 0
			float screenY = vUv.y * 2.0 - 1.0;
			float visualFade = smoothstep( - 1.0, - 0.4, screenY );
			slimeAlpha *= visualFade;

			vec3 result = mix( baseColor, edgeBlended, slimeAlpha );

			gl_FragColor = vec4( result, 1.0 );

		}
	`,
	transparent: false,
	depthTest: false,
	depthWrite: false,

} );

const fullscreenQuad = new THREE.Mesh( new THREE.PlaneGeometry( 2, 2 ), thresholdMaterial );
const mainScene = new THREE.Scene();
mainScene.add( fullscreenQuad );

// --- canvas サイズ同期 ---
let canvasCssW = 0;
let canvasCssH = 0;

function syncCanvasSize() {

	const w = textEl.offsetWidth;
	const h = textEl.offsetHeight;
	if ( w === 0 || h === 0 ) return false;
	if ( w === canvasCssW && h === canvasCssH ) return false;

	canvasCssW = w;
	canvasCssH = h;
	renderer.setSize( w, h, false );
	canvas.style.height = `${ h }px`;

	// blob RT は half-res (DPR を加味した物理ピクセルの半分)
	const px = renderer.domElement.width;
	const py = renderer.domElement.height;
	const bw = Math.max( 2, Math.floor( px / 2 ) );
	const bh = Math.max( 2, Math.floor( py / 2 ) );
	blobRT.setSize( bw, bh );
	thresholdMaterial.uniforms.uTexelSize.value.set( 1 / bw, 1 / bh );

	return true;

}

// --- home サンプリング: HTMLTexture を RT に焼いて readPixels で opaque pixel を集める ---
const sampleScene = new THREE.Scene();
const sampleMaterial = new THREE.ShaderMaterial( {

	uniforms: { uMap: { value: textTexture } },
	vertexShader: /* glsl */`
		varying vec2 vUv;
		void main() {
			vUv = uv;
			gl_Position = vec4( position.xy, 0.0, 1.0 );
		}
	`,
	fragmentShader: /* glsl */`
		varying vec2 vUv;
		uniform sampler2D uMap;
		void main() { gl_FragColor = texture2D( uMap, vUv ); }
	`,
	transparent: true,

} );
sampleScene.add( new THREE.Mesh( new THREE.PlaneGeometry( 2, 2 ), sampleMaterial ) );
const sampleCamera = new THREE.OrthographicCamera( - 1, 1, 1, - 1, - 1, 1 );

function sampleHomes() {

	const rect = textEl.getBoundingClientRect();
	const dpr = window.devicePixelRatio;
	const w = Math.max( 4, Math.floor( rect.width  * dpr ) );
	const h = Math.max( 4, Math.floor( rect.height * dpr ) );

	const rt = new THREE.WebGLRenderTarget( w, h, {
		minFilter: THREE.LinearFilter,
		magFilter: THREE.LinearFilter,
		format: THREE.RGBAFormat,
		type: THREE.UnsignedByteType,
	} );

	const prevTarget = renderer.getRenderTarget();
	renderer.setRenderTarget( rt );
	renderer.setClearColor( 0x000000, 0 );
	renderer.clear();
	renderer.render( sampleScene, sampleCamera );
	renderer.setRenderTarget( prevTarget );

	const buf = new Uint8Array( w * h * 4 );
	renderer.readRenderTargetPixels( rt, 0, 0, w, h, buf );
	rt.dispose();

	// 不透明 pixel を集める。readPixels は y=0 が下、画像座標は y=0 が上 ⇄ readPixels 結果の
	// y インデックスは「下から数えた行」になる。home サンプル後に ndc 変換で
	// `( aHome - 0.5 ) * 2.0` を行うので、ここではそのまま正規化して [0,1] で渡す
	// (= ndc.y 直接: 0 → -1, 1 → +1。readPixels の y=0 → 下 → ndc.y=-1 で一貫)
	const opaque = [];
	for ( let y = 0; y < h; y ++ ) {

		for ( let x = 0; x < w; x ++ ) {

			if ( buf[ ( y * w + x ) * 4 + 3 ] > ALPHA_THRESHOLD ) {

				opaque.push( x, y );

			}

		}

	}

	if ( opaque.length === 0 ) return false;

	// <em> 要素がある場合、その bounding box 内に絞って sampling する。
	// textEl 全体の rect と em の rect から RT 内の em 領域 (readPixels y は下から数えるので変換) を計算。
	let pool = opaque;
	if ( emEl ) {

		const textRect = textEl.getBoundingClientRect();
		const emRect   = emEl.getBoundingClientRect();
		const emL  = ( emRect.left   - textRect.left ) * dpr;
		const emR  = ( emRect.right  - textRect.left ) * dpr;
		const emT  = ( emRect.top    - textRect.top  ) * dpr;
		const emB  = ( emRect.bottom - textRect.top  ) * dpr;
		// readPixels の y は下から → 画像 y=emT は readPixels y=h-emT、emB は h-emB
		const emRPBot = h - emB;
		const emRPTop = h - emT;

		const filtered = [];
		for ( let i = 0; i < opaque.length; i += 2 ) {

			const px = opaque[ i     ];
			const py = opaque[ i + 1 ];
			if ( px >= emL && px <= emR && py >= emRPBot && py <= emRPTop ) {

				filtered.push( px, py );

			}

		}
		if ( filtered.length > 0 ) pool = filtered;

	}

	const n = pool.length / 2;
	for ( let i = 0; i < PARTICLE_COUNT; i ++ ) {

		const idx = ( Math.random() * n ) | 0;
		const px = pool[ idx * 2     ];
		const py = pool[ idx * 2 + 1 ];
		aHome[ i * 2     ] = px / w;
		aHome[ i * 2 + 1 ] = py / h;

	}

	homeAttr.needsUpdate = true;
	return true;

}

// --- 初回 paint 検出 & 変更検出 ---
let firstPainted = false;
let needHomeResample = false;

const _htmlTexturePaint = canvas.onpaint;

canvas.onpaint = ( e ) => {

	if ( _htmlTexturePaint ) _htmlTexturePaint.call( canvas, e );

	const sizeChanged = syncCanvasSize();
	if ( canvasCssW === 0 || canvasCssH === 0 ) return;

	if ( ! firstPainted ) {

		firstPainted = true;
		needHomeResample = true;
		return;

	}

	if ( sizeChanged ) {

		needHomeResample = true;
		return;

	}

	if ( e && e.changedElements && e.changedElements.length > 0 ) {

		needHomeResample = true;

	}

};

window.addEventListener( 'resize', () => {

	blobMaterial.uniforms.uPointSize.value = POINT_SIZE;
	if ( syncCanvasSize() && firstPainted ) needHomeResample = true;

} );

// --- メインループ ---
renderer.setAnimationLoop( ( now ) => {

	if ( ! firstPainted ) return;

	if ( needHomeResample ) {

		if ( sampleHomes() ) {

			needHomeResample = false;
			blobMaterial.uniforms.uHomeReady.value = 1;

		}

	}

	uTime.value = now * 0.001;

	// Pass 1: blob を additive で blob RT に焼く
	const prevTarget = renderer.getRenderTarget();
	renderer.setRenderTarget( blobRT );
	renderer.setClearColor( 0x000000, 0 );
	renderer.clear();
	renderer.render( blobScene, camera );
	renderer.setRenderTarget( prevTarget );

	// Pass 2: density + 文字下地を合成して canvas へ
	renderer.setClearColor( 0x010203, 1 );
	renderer.clear();
	renderer.render( mainScene, camera );

} );

</script>
</body>
</html>
